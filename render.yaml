services:
  - type: web
    name: ai-video-classifier
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      apt-get update && apt-get install -y libgl1
      python -c "from tensorflow.keras.applications import Xception; Xception(weights='imagenet', include_top=False, input_shape=(299, 299, 3))"
    startCommand: gunicorn app:app --bind 0.0.0.0:10000 --timeout 300 --workers 1 --preload
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
